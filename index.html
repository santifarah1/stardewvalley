<title>Wiki Offline · Stardew Valley</title>
<style>
:root{
  --bg:#1a2b1a; --panel:#27432a; --panel2:#2f5233; --line:#3d6b42;

}
*{box-sizing:border-box; margin:0; padding:0}
body{
  font-family:'Trebuchet MS','Segoe UI',sans-serif; background:var(--bg);
  background-image:
    radial-gradient(circle at 20% 10%, rgba(127,176,105,.08) 0, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(232,176,74,.06) 0, transparent 40%);
  color:var(--txt); min-height:100vh; line-height:1.5;
}
header{
  background:var(--panel); border-bottom:3px solid var(--acc);
  padding:16px; text-align:center; position:sticky; top:0; z-index:10;
  box-shadow:0 4px 12px rgba(0,0,0,.4);
}
header h1{font-size:1.55rem; color:var(--acc); letter-spacing:1px; text-shadow:2px 2px 0 #000}
header p{color:var(--dim); font-size:.82rem; margin-top:2px}
.wrap{max-width:960px; margin:0 auto; padding:14px}
#search{
  width:100%; padding:13px 16px; font-size:1rem; border-radius:10px;
  border:2px solid var(--line); background:var(--panel2); color:var(--txt);
  margin-bottom:12px; font-family:inherit;
}
#search:focus{outline:none; border-color:var(--acc); box-shadow:0 0 0 3px rgba(232,176,74,.2)}
#search::placeholder{color:var(--dim)}
.tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px}
.tab{
  flex:1 1 auto; min-width:78px; padding:9px 6px; border:2px solid var(--line);
  background:var(--panel2); color:var(--dim); border-radius:10px; cursor:pointer;
  font-family:inherit; font-size:.78rem; font-weight:bold; transition:.15s; text-align:center;
}
.tab:hover{border-color:var(--acc2); color:var(--txt)}
.tab.on{background:var(--acc); color:#1a2b1a; border-color:var(--acc)}
.count{color:var(--dim); font-size:.75rem; margin:8px 2px 14px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:11px}
.card{
  background:var(--panel); border:2px solid var(--line); border-radius:12px;
  padding:13px; cursor:pointer; transition:.15s; position:relative; overflow:hidden;
}
.card:hover{border-color:var(--acc); transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.35)}
.card h3{color:var(--acc); font-size:1rem; margin-bottom:5px; padding-right:64px}
.card .meta{font-size:.76rem; color:var(--dim); margin-bottom:5px}
.card .snippet{font-size:.83rem; color:var(--txt); opacity:.85; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.badge{position:absolute; top:11px; right:11px; font-size:.62rem; padding:3px 8px; border-radius:20px; font-weight:bold; background:var(--acc2); color:#13230f}
.badge.rare{background:var(--rare); color:#1a0a2a}
.badge.fish{background:var(--water); color:#fff}
.badge.craft{background:var(--craft); color:#2a1206}
.badge.food{background:var(--food); color:#2a0808}
.badge.bundle{background:var(--bundle); color:#2a2206}
.badge.animal{background:var(--animal); color:#2a1606}
.empty{text-align:center; color:var(--dim); padding:40px 20px; font-style:italic}
.guide{background:var(--panel); border:2px solid var(--line); border-radius:12px; padding:15px; margin-bottom:13px}
.guide h3{color:var(--acc2); font-size:1.15rem; margin-bottom:4px}
.guide .sub{color:var(--dim); font-size:.84rem; margin-bottom:10px}
.guide ol{margin-left:18px; display:flex; flex-direction:column; gap:7px}
.guide li{font-size:.88rem}
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.72); display:none; align-items:center; justify-content:center; z-index:50; padding:16px}
.overlay.show{display:flex}
.modal{
  background:var(--panel); border:3px solid var(--acc); border-radius:16px;
  max-width:500px; width:100%; max-height:86vh; overflow-y:auto; padding:22px;
  box-shadow:0 10px 40px rgba(0,0,0,.6);
}
.modal h2{color:var(--acc); font-size:1.45rem; margin-bottom:4px; padding-right:30px}
.modal .kind{color:var(--acc2); font-size:.78rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; font-weight:bold}
.modal .row{display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:.88rem}
.modal .row span:first-child{color:var(--dim); flex-shrink:0}
.modal .row span:last-child{color:var(--txt); text-align:right; font-weight:bold}
.block{margin-top:15px}
.block .label{color:var(--acc); font-size:.76rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; font-weight:bold}
.block p{font-size:.9rem; line-height:1.55}
.tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px}
.tag{background:var(--panel2); border:1px solid var(--line); border-radius:20px; padding:4px 11px; font-size:.76rem}
.tag.love{border-color:var(--acc2)}
.tag.hate{border-color:#b05050; color:#e0a0a0}
.close{position:sticky; top:-4px; float:right; background:var(--panel2); border:2px solid var(--line); color:var(--txt); width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1.1rem; margin:-8px -8px 0 0}
.close:hover{border-color:var(--acc); color:var(--acc)}
footer{text-align:center; color:var(--dim); font-size:.74rem; padding:22px 16px 38px; line-height:1.6}
</style>

<script>
const CATS = [
  {id:"guias", label:"🗺️ Guías", kind:"Guía de progreso"},
  {id:"cultivos", label:"🌱 Cultivos", kind:"Cultivo"},
  {id:"peces", label:"🎣 Peces", kind:"Pez"},
  {id:"aldeanos", label:"👥 Aldeanos", kind:"Aldeano"},
  {id:"recursos", label:"⛏️ Recursos", kind:"Recurso / Mineral"},
  {id:"artesania", label:"⚙️ Máquinas", kind:"Máquina / Artesanía"},
  {id:"cocina", label:"🍳 Cocina", kind:"Receta de cocina"},
  {id:"lotes", label:"📦 Lotes", kind:"Lote del Centro Comunitario"},
  {id:"animales", label:"🐄 Animales", kind:"Animal de granja"},
  {id:"artefactos", label:"🏺 Artefactos", kind:"Artefacto del museo"},
  {id:"notas", label:"📜 Notas", kind:"Nota secreta"}
];
let cur="guias", q="";
const tabsEl=document.getElementById("tabs");
const contentEl=document.getElementById("content");
const countEl=document.getElementById("count");
const searchEl=document.getElementById("search");
const overlay=document.getElementById("overlay");
const modal=document.getElementById("modal");

CATS.forEach(c=>{
  const b=document.createElement("button");
  b.className="tab"+(c.id===cur?" on":""); b.textContent=c.label;
  b.onclick=()=>{cur=c.id; q=""; searchEl.value=""; [...tabsEl.children].forEach(x=>x.classList.remove("on")); b.classList.add("on"); render();};
  tabsEl.appendChild(b);
});
searchEl.addEventListener("input", e=>{ q=e.target.value.toLowerCase().trim(); render(); });
const matchesAll = it => JSON.stringify(it).toLowerCase().includes(q);

function render(){
  if(q){ renderSearch(); return; }
  if(cur==="guias"){ countEl.textContent=DB.guias.length+" guías"; renderGuias(DB.guias); return; }
  countEl.textContent=DB[cur].length+" entradas";
  renderCards(DB[cur], cur);
}
function renderSearch(){
  let html="", found=0;
  CATS.forEach(c=>{
    if(c.id==="guias") return;
    const items=DB[c.id].filter(matchesAll);
    if(items.length){
      found+=items.length;
      html+=`<div style="margin:14px 0 8px;color:var(--acc);font-weight:bold;font-size:.85rem">${c.label} (${items.length})</div>`;
      html+=`<div class="grid">`+items.map(it=>cardHTML(it,c.id)).join("")+`</div>`;
    }
  });
  const gh=DB.guias.filter(matchesAll);
  if(gh.length){ found+=gh.length; html+=`<div style="margin-top:16px"></div>`+gh.map(guideHTML).join(""); }
  countEl.textContent=found+" resultados para \""+q+"\"";
  contentEl.innerHTML = found ? html : `<div class="empty">Nada encontrado para "${q}". Probá con otra palabra.</div>`;
  bindCards();
}
function badge(it,cat){
  if(cat==="cultivos") return (it.tipo&&it.tipo.startsWith("Repet"))?`<span class="badge">Repite</span>`:(it.semilla==="Rara"?`<span class="badge rare">Raro</span>`:`<span class="badge">${(it.est||"").split("/")[0]}</span>`);
  if(cat==="peces") return it.dif==="Extrema"?`<span class="badge rare">Legendario</span>`:`<span class="badge fish">${it.dif}</span>`;
  if(cat==="aldeanos") return it.solt?`<span class="badge rare">Casable</span>`:`<span class="badge">Pueblo</span>`;
  if(cat==="recursos") return it.n.includes("prismát")?`<span class="badge rare">Raro</span>`:`<span class="badge">Mineral</span>`;
  if(cat==="artesania") return `<span class="badge craft">Máquina</span>`;
  if(cat==="cocina") return `<span class="badge food">Plato</span>`;
  if(cat==="lotes") return `<span class="badge bundle">Sala</span>`;
  if(cat==="animales") return `<span class="badge animal">Animal</span>`;
  if(cat==="artefactos") return `<span class="badge bundle">Museo</span>`;
  if(cat==="notas") return `<span class="badge rare">Secreto</span>`;
  return "";
}
function metaLine(it,cat){
  if(cat==="cultivos") return `${it.est} · ${it.dias}d · vende ${it.venta}g`;
  if(cat==="peces") return `${it.est} · ${it.lugar}`;
  if(cat==="aldeanos") return `Cumple: ${it.cumple}`;
  if(cat==="recursos") return it.lugar;
  if(cat==="artesania") return it.lugar;
  if(cat==="cocina") return it.efecto;
  if(cat==="lotes") return it.recompensa;
  if(cat==="animales") return `${it.edif} · ${it.precio}`;
  if(cat==="artefactos") return it.lugar;
  if(cat==="notas") return it.tipo;
  return "";
}
function cardHTML(it,cat){
  return `<div class="card" data-cat="${cat}" data-name="${it.n.replace(/"/g,'&quot;')}">
    ${badge(it,cat)}<h3>${it.n}</h3>
    <div class="meta">${metaLine(it,cat)}</div>
    <div class="snippet">${it.desc}</div></div>`;
}
function renderCards(arr,cat){ contentEl.innerHTML=`<div class="grid">`+arr.map(it=>cardHTML(it,cat)).join("")+`</div>`; bindCards(); }
function bindCards(){ document.querySelectorAll(".card").forEach(c=>{ c.onclick=()=>openModal(c.dataset.cat,c.dataset.name); }); }
function guideHTML(g){ return `<div class="guide"><h3>${g.est}</h3><div class="sub">${g.desc}</div><ol>${g.pasos.map(p=>`<li>${p}</li>`).join("")}</ol></div>`; }
function renderGuias(arr){ contentEl.innerHTML=arr.map(guideHTML).join(""); }

function openModal(cat,name){
  const it=DB[cat].find(x=>x.n===name); if(!it) return;
  const kind=CATS.find(c=>c.id===cat).kind;
  let rows="";
  if(cat==="cultivos") rows=row("Estación",it.est)+row("Días en crecer",it.dias)+row("Tipo",it.tipo)+row("Precio semilla",typeof it.semilla==="number"?it.semilla+"g":it.semilla)+row("Precio venta",it.venta+"g");
  else if(cat==="peces") rows=row("Estación",it.est)+row("Dónde",it.lugar)+row("Clima",it.clima)+row("Horario",it.hora)+row("Dificultad",it.dif);
  else if(cat==="aldeanos") rows=row("Cumpleaños",it.cumple)+row("Casable",it.solt?"Sí 💍":"No");
  else if(cat==="recursos") rows=row("Dónde conseguir",it.lugar)+row("Herramienta",it.herr);
  else if(cat==="artesania") rows=row("Cómo conseguir",it.lugar)+(it.mat?row("Materiales",it.mat):"");
  else if(cat==="cocina") rows=row("Ingredientes",it.ing)+row("Efecto",it.efecto)+row("Cómo conseguir receta",it.como);
  else if(cat==="lotes") rows=row("Recompensa",it.recompensa)+row("Cómo completarlo",it.como);
  else if(cat==="animales") rows=row("Vive en",it.edif)+row("Precio",it.precio)+row("Produce",it.prod);
  else if(cat==="artefactos") rows=row("Dónde conseguir",it.lugar);
  else if(cat==="notas") rows=row("Tipo",it.tipo);
  let extra="";
  if(cat==="aldeanos"){
    extra=`<div class="block"><div class="label">Le encanta (regalos)</div><div class="tags">${it.ama.map(a=>`<span class="tag love">${a}</span>`).join("")}</div></div>
           <div class="block"><div class="label">Odia</div><div class="tags">${it.odia.map(a=>`<span class="tag hate">${a}</span>`).join("")}</div></div>`;
  }
  if(cat==="lotes"){
    extra=`<div class="block"><div class="label">Lotes que incluye</div><p>${it.items}</p></div>`;
  }
  modal.innerHTML=`<button class="close" onclick="closeM()">✕</button>
    <h2>${it.n}</h2><div class="kind">${kind}</div>${rows}
    <div class="block"><div class="label">${cat==='lotes'?'Detalle':'Qué es'}</div><p>${it.desc}</p></div>
    <div class="block"><div class="label">${cat==='lotes'?'Consejo':'Para qué sirve'}</div><p>${it.uso}</p></div>${extra}`;
  overlay.classList.add("show");
}
function row(k,v){ return `<div class="row"><span>${k}</span><span>${v}</span></div>`; }
function closeM(){ overlay.classList.remove("show"); }
overlay.onclick=e=>{ if(e.target===overlay) closeM(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeM(); });
render();
</script>
</body>
</html>
